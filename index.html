var inputNumber = document.getElementById('inputNumber');
var submitButton = document.getElementById('submitButton');

submitButton.addEventListener('click', function () {
    var numberValue = inputNumber.value;
    var intValue = parseInt(numberValue);

    if (!isValidNumber(intValue)) {
        Swal.fire({
            icon: 'error',
            title: 'Cảnh báo.',
            text: 'Giá trị không hợp lệ. Vui lòng nhập số!',
        });
    } else if (intValue <= 0) {
        intValue = 1;
        Swal.fire({
            icon: 'error',
            title: 'Cảnh báo.',
            text: 'Giá trị không thể nhỏ hơn hoặc bằng 0!',
        });
    } else if (intValue > 100) {
        intValue = 50;
        Swal.fire({
            icon: 'error',
            title: 'Cảnh báo.',
            text: 'Bạn chỉ có thể đặt tối đa là 100!',
        });
    } else {
        // Gửi dữ liệu lên Firebase
        var firebaseRef = firebase.database().ref().child('/Canh_bao');
        firebaseRef.set(intValue)
            .then(function () {
                // Đặt lại giá trị của ô nhập liệu thành chuỗi rỗng
                inputNumber.value = "";
            })
            .catch(function (error) {
                console.log("Lỗi khi gửi dữ liệu:", error);
            });
    }
});

function isValidNumber(value) {
    return !isNaN(value) && Number.isInteger(value);
}

function isValidEmail(email) {
    // Regular expression for validating an Email
    var emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    return emailPattern.test(email);
}


var Kinh_do = firebase.database().ref().child('Kinh_do');
var Vi_do = firebase.database().ref().child('Vi_do');

let latitude = null;
let longitude = null;

// Lắng nghe dữ liệu từ Firebase
Kinh_do.on('value', (snap) => {
    latitude = snap.val();
    updateLink();
});

Vi_do.on('value', (snap) => {
    longitude = snap.val();
    updateLink();
});

// Cập nhật liên kết Google Maps
function updateLink() {
    const mapLink = document.getElementById('map-link');
    const statusMessage = document.getElementById('status-message'); // Phần tử hiển thị trạng thái

    // if (latitude === 0 && longitude === 0) {
    //     // Nếu mất tín hiệu GPS
    //     document.getElementById("map-link").innerHTML ="Mất kết nối GPS";
    //     //statusMessage.innerText = ;
    //     mapLink.style.display = 'none'; // Ẩn liên kết Google Maps
    // } 
    if (latitude !== null && longitude !== null) {
        // Nếu tín hiệu GPS hợp lệ
        const googleMapsLink = `https://www.google.com/maps?q=${longitude},${latitude}`; 

        const mapLink = document.getElementById('map-link');
        mapLink.href = googleMapsLink;
        mapLink.style.display = 'inline-block';
    }
}
